# LLM Configuration
# Supports multiple providers with primary/backup setup

default_provider: qwen

providers:
  mock:
    enabled: true
    type: mock
    models:
      primary: mock-gpt-4
      embedding: mock-embedding

  minimax:
    enabled: true
    type: minimax
    api_key: ${MINIMAX_API_KEY}
    group_id: ${MINIMAX_GROUP_ID}
    api_base: https://api.minimax.chat/v1
    models:
      primary: MiniMax2.7
      embedding: emb通用

  openai:
    enabled: false
    type: openai
    api_key: ${OPENAI_API_KEY}
    api_base: https://api.openai.com/v1
    models:
      primary: gpt-4o
      embedding: text-embedding-3-small

  qwen:
    enabled: true
    type: qwen
    api_key: ${QWEN_API_KEY}
    api_base: ${QWEN_API_BASE}
    models:
      primary: qwen-plus
      embedding: text-embedding-v3

  anthropic:
    enabled: false
    type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    models:
      primary: claude-3-5-sonnet-20241022
      vision: claude-3-5-sonnet-20241022

  autoglm:
    enabled: true
    type: autoglm
    api_key: ms-ba78c487-f9e8-4ad6-a2ab-5240d341ab43
    api_base: https://api-inference.modelscope.cn/v1
    model: ZhipuAI/AutoGLM-Phone-9B
    timeout: 120

  autoglm_local:
    enabled: true
    type: autoglm_local
    autoglm_path: ../Open-AutoGLM
    maestro_path: maestro
    default_device_serial: auto

# Intent classification prompt template
intent_prompt_template: |
  You are an intent classifier for mobile app testing.
  Classify the following user instruction into one of these intents:
  - app_open: Open an application
  - login: Login to an app
  - logout: Logout from an app
  - swipe: Swipe on screen
  - tap: Tap on element
  - input: Input text
  - assert: Verify element or state
  - scroll: Scroll on screen
  - capture: Take screenshot

  Instruction: {{instruction}}

  Respond with JSON:
  {
    "intent": "intent_name",
    "entities": {
      "app_name": "wechat",
      "element": "login_button",
      "text": "hello"
    },
    "confidence": 0.95
  }

# Script generation prompt template
script_prompt_template: |
  Generate a test script for mobile app testing using Maestro framework.

  Intent: {{intent}}
  Entities: {{entities}}

  IMPORTANT: Use ONLY these valid Maestro actions:
  - launchApp: Launch app (target = app package ID, value = null)
  - tapOn: Tap on element (target = "id:xxx" or "text:xxx", value = null)
  - inputText: Input text (target = null, value = "text to input")
  - swipe: Swipe screen (value = {startX: 0-1, startY: 0-1, endX: 0-1, endY: 0-1, duration: ms})
  - scroll: Scroll (value = null)
  - waitForAnimationToEnd: Wait for animations to complete (no value needed)
  - takeScreenshot: Take screenshot (value = null)
  - pressKey: Press key (value = key like "BACK", "HOME", "ENTER")
  - stopApp: Stop app (target = app ID, value = null)

  IMPORTANT RULES:
  - target for tapOn MUST be "id:com.tencent.mm:id/xxx" or "text:ButtonText"
  - appId format: "com.tencent.mm" (not com.example.app)
  - Use waitForAnimationToEnd instead of waitForTime
  - pressKey uses "key" field with string like "BACK" not numeric keycode
  - Do NOT use: waitForElementToAppear, assert_app_state, assert_element_exists, waitForTime

  Respond with JSON only:
  {"steps": [
    {"action": "launchApp", "target": "com.tencent.mm", "value": null},
    {"action": "waitForAnimationToEnd", "target": null, "value": null},
    {"action": "tapOn", "target": "text:我知道了", "value": null}
  ]}
